version: '2'

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - noctx
    - revive
    - unconvert
    - unparam

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-rules:
    - path: cmd/atlas/
      linters:
        - revive
    - path: internal/tests/
      linters:
        - errcheck
